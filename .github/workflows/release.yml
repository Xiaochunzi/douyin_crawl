name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: Windows
            ext: .exe
          - os: ubuntu-latest
            target: Linux
            ext: ""
          - os: macos-latest
            target: macOS
            ext: ""
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable (Interactive)
      run: |
        pyinstaller --onefile --name douyin_downloader${{ matrix.ext }} douyin_interactive.py
    
    - name: Build executable (CLI)
      run: |
        pyinstaller --onefile --name douyin_cli${{ matrix.ext }} douyin_cli.py
    
    - name: Package files
      shell: bash
      run: |
        mkdir -p release
        cp dist/douyin_downloader${{ matrix.ext }} release/
        cp dist/douyin_cli${{ matrix.ext }} release/
        cp -r core release/
        cp -r util release/
        cp requirements.txt release/
        cp README.md release/
        cp LICENSE release/
    
    - name: Create archive (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        cd release
        7z a ../douyin_downloader_${{ matrix.target }}.zip *
    
    - name: Create archive (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        cd release
        tar -czf ../douyin_downloader_${{ matrix.target }}.tar.gz *
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: douyin_downloader_${{ matrix.target }}
        path: |
          douyin_downloader_${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true
    
    - name: List artifacts
      run: |
        ls -la artifacts/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: artifacts/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
